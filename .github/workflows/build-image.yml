name: build-gpu-image

# Builds the prebuilt GPU deps image on an x86 CI runner (never on an ARM Mac) and
# pushes it to GHCR. Trigger manually (Actions tab / `gh workflow run build-gpu-image`)
# or automatically when the deps / Dockerfile change.
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - docker/Dockerfile
      - requirements-gpu.txt
      - .github/workflows/build-image.yml

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # A CUDA+torch+vLLM image is ~12GB; reclaim runner disk so the build fits.
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/.ghcup
          sudo docker image prune -af || true
          df -h /

      - name: Lowercase owner (GHCR paths must be lowercase)
        id: o
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ steps.o.outputs.owner }}/rl-gym-gpu:latest
            ghcr.io/${{ steps.o.outputs.owner }}/rl-gym-gpu:${{ github.sha }}
