<svg xmlns="http://www.w3.org/2000/svg" width="2080" height="1080" viewBox="0 0 1040 540" font-family="Helvetica, Arial, sans-serif">
  <rect width="2080" height="1080" fill="#ffffff"/>
  <text x="40" y="46" font-size="26" font-weight="700" fill="#16202e">Security reward: the RL stage is what transfers</text>
  <text x="40" y="72" font-size="15" fill="#5b6472">Mean verifier reward (0–1). The tuned 8B beats the human reference on both splits.</text>

  <!-- gridlines + y labels (baseline y=440, top=150 for reward=1.0; scale = 290) -->
  <g stroke="#e8ebef" stroke-width="1">
    <line x1="100" y1="440" x2="960" y2="440"/>
    <line x1="100" y1="367.5" x2="960" y2="367.5"/>
    <line x1="100" y1="295" x2="960" y2="295"/>
    <line x1="100" y1="222.5" x2="960" y2="222.5"/>
    <line x1="100" y1="150" x2="960" y2="150"/>
  </g>
  <g font-size="12" fill="#8a94a2" text-anchor="end">
    <text x="90" y="444">0.00</text>
    <text x="90" y="371.5">0.25</text>
    <text x="90" y="299">0.50</text>
    <text x="90" y="226.5">0.75</text>
    <text x="90" y="154">1.00</text>
  </g>

  <!-- panel titles -->
  <text x="290" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#16202e">IaC-Eval  ·  frozen, disjoint split</text>
  <text x="750" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#16202e">Holdout  ·  Checkov + GitHub, never sampled</text>
  <line x1="510" y1="140" x2="510" y2="460" stroke="#e2e6ea" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- LEFT PANEL bars: base .629 SFT .679 GRPO .694 human .459 -->
  <!-- base -->
  <rect x="130" y="257.6" width="60" height="182.4" rx="4" fill="#a9d3d2"/>
  <text x="160" y="249" text-anchor="middle" font-size="13" font-weight="700" fill="#16202e">0.629</text>
  <!-- SFT -->
  <rect x="225" y="243.1" width="60" height="196.9" rx="4" fill="#5bb0ad"/>
  <text x="255" y="234" text-anchor="middle" font-size="13" font-weight="700" fill="#16202e">0.679</text>
  <!-- GRPO -->
  <rect x="320" y="238.7" width="60" height="201.3" rx="4" fill="#0e7c7b"/>
  <text x="350" y="230" text-anchor="middle" font-size="13" font-weight="700" fill="#0e7c7b">0.694</text>
  <!-- human -->
  <rect x="415" y="306.9" width="60" height="133.1" rx="4" fill="#c3cad3"/>
  <text x="445" y="298" text-anchor="middle" font-size="13" font-weight="700" fill="#5b6472">0.459</text>

  <!-- RIGHT PANEL bars: base .756 SFT .781 GRPO .876 human .524 -->
  <rect x="590" y="220.8" width="60" height="219.2" rx="4" fill="#a9d3d2"/>
  <text x="620" y="212" text-anchor="middle" font-size="13" font-weight="700" fill="#16202e">0.756</text>
  <rect x="685" y="213.5" width="60" height="226.5" rx="4" fill="#5bb0ad"/>
  <text x="715" y="205" text-anchor="middle" font-size="13" font-weight="700" fill="#16202e">0.781</text>
  <rect x="780" y="185.9" width="60" height="254.1" rx="4" fill="#0e7c7b"/>
  <text x="810" y="177" text-anchor="middle" font-size="13" font-weight="700" fill="#0e7c7b">0.876</text>
  <rect x="875" y="288" width="60" height="152" rx="4" fill="#c3cad3"/>
  <text x="905" y="279" text-anchor="middle" font-size="13" font-weight="700" fill="#5b6472">0.524</text>

  <!-- baseline -->
  <line x1="100" y1="440" x2="960" y2="440" stroke="#3a4658" stroke-width="1.5"/>

  <!-- x labels -->
  <g font-size="12.5" fill="#3a4658" text-anchor="middle">
    <text x="160" y="460">base</text>
    <text x="255" y="460">SFT</text>
    <text x="350" y="460" font-weight="700" fill="#0e7c7b">GRPO</text>
    <text x="445" y="460">human ref</text>
    <text x="620" y="460">base</text>
    <text x="715" y="460">SFT</text>
    <text x="810" y="460" font-weight="700" fill="#0e7c7b">GRPO</text>
    <text x="905" y="460">human ref</text>
  </g>

  <!-- annotation -->
  <text x="40" y="505" font-size="13.5" fill="#8a94a2">Base model picked by bake-off: granite-4.1-8b (0.636) beat Qwen3-8B (0.567) before any training. Human reference = the benchmark's own "ground-truth" configs.</text>
</svg>
